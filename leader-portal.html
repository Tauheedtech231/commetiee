<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>HalaCircle — Leader Portal | Manage Join Requests & Committees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background: #F4F6F8;
      color: #0B1C3D;
    }

    :root {
      --darkNavy: #0B1C3D;
      --deepRed: #B11217;
      --white: #FFFFFF;
      --lightGrey: #F4F6F8;
      --shadow-xl: 0 25px 40px -12px rgba(0, 0, 0, 0.15);
      --transition-smooth: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    /* Navbar */
    header {
      position: fixed;
      top: 24px;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .navbar {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-radius: 80px;
      padding: 10px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 1300px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(177, 18, 23, 0.15);
    }

    .brand {
      font-size: 1.7rem;
      font-weight: 800;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--deepRed), #a00f13);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .nav-links {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--darkNavy);
      font-weight: 700;
      font-size: 0.9rem;
      transition: var(--transition-smooth);
    }

    .nav-links a:hover {
      color: var(--deepRed);
    }

    .btn {
      padding: 8px 22px;
      border-radius: 60px;
      font-weight: 800;
      transition: var(--transition-smooth);
      border: none;
      cursor: pointer;
      font-family: 'Quicksand', sans-serif;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--deepRed);
      color: var(--deepRed);
    }

    .btn-primary {
      background: var(--deepRed);
      color: white;
      box-shadow: 0 5px 12px rgba(177, 18, 23, 0.3);
    }

    /* Main Container */
    .portal-container {
      max-width: 1400px;
      margin: 120px auto 60px;
      padding: 0 32px;
    }

    /* Header Section */
    .portal-header {
      background: linear-gradient(135deg, #0B1C3D 0%, #1a2d4e 100%);
      border-radius: 48px;
      padding: 40px 48px;
      margin-bottom: 40px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .leader-info h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .leader-info p {
      opacity: 0.8;
    }

    .back-home {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .back-home:hover {
      background: var(--deepRed);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }

    .stat-card {
      background: white;
      border-radius: 32px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: var(--shadow-xl);
      transition: 0.2s;
      border: 1px solid rgba(177,18,23,0.1);
    }

    .stat-card i {
      font-size: 2.5rem;
      color: var(--deepRed);
      margin-bottom: 12px;
    }

    .stat-card .number {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--darkNavy);
    }

    .stat-card .label {
      color: #6b7a8f;
      font-weight: 600;
    }

    /* Section Title */
    .section-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title i {
      color: var(--deepRed);
    }

    /* Requests Container */
    .requests-container {
      background: white;
      border-radius: 48px;
      padding: 32px;
      margin-bottom: 48px;
      box-shadow: var(--shadow-xl);
    }

    .request-card {
      background: #F8FAFE;
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
      border-left: 5px solid var(--deepRed);
      transition: 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .request-card:hover {
      transform: translateX(5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .request-info h4 {
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .request-info p {
      color: #5a6e8a;
      font-size: 0.85rem;
      margin: 4px 0;
    }

    .committee-badge {
      background: #e3f0ff;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 800;
      display: inline-block;
      margin-top: 8px;
      color: #0a5c8e;
    }

    .request-actions {
      display: flex;
      gap: 12px;
    }

    .btn-approve {
      background: #2d6a4f;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-approve:hover {
      background: #1b4d3a;
      transform: scale(1.02);
    }

    .btn-reject {
      background: #e2e8f0;
      color: var(--deepRed);
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-reject:hover {
      background: #ffe6e5;
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      color: #8a9bb0;
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* My Committees Section */
    .committees-container {
      background: white;
      border-radius: 48px;
      padding: 32px;
      box-shadow: var(--shadow-xl);
    }

    .committee-item {
      background: #F8FAFE;
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .committee-details h4 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .committee-details p {
      font-size: 0.75rem;
      color: #5a6e8a;
    }

    .member-count {
      background: var(--deepRed);
      color: white;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 800;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--darkNavy);
      color: white;
      padding: 12px 24px;
      border-radius: 70px;
      opacity: 0;
      transition: 0.25s;
      pointer-events: none;
      z-index: 1300;
      font-weight: 700;
    }
    .toast.show { opacity: 1; }

    /* Login Required */
    .login-required {
      text-align: center;
      padding: 80px 32px;
      background: white;
      border-radius: 48px;
      margin-top: 100px;
    }

    @media (max-width: 800px) {
      .portal-container { padding: 0 20px; margin-top: 100px; }
      .request-card { flex-direction: column; text-align: center; }
      .request-actions { justify-content: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="navbar">
    <a href="index.html" class="brand">🟡 HalaCircle</a>
    <div class="nav-links">
      <a href="index.html">← Back to Home</a>
      <a href="#" style="color: var(--deepRed);"><i class="fas fa-crown"></i> Leader Portal</a>
    </div>
    <div style="display: flex; gap: 12px;">
      <button class="btn btn-outline" id="logoutBtn">Logout</button>
    </div>
  </div>
</header>

<main>
  <div class="portal-container" id="portalContent">
    <!-- Dynamic content loaded via JS -->
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // Helper functions
  function getStorage(key) {
    const data = localStorage.getItem(key);
    return data ? JSON.parse(data) : null;
  }
  function setStorage(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = isError ? '#B11217' : '#0B1C3D';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // Get current logged in user
  let currentUser = getStorage('currentUser');

  // Redirect to login if not logged in
  function checkLogin() {
    if (!currentUser || currentUser.id === 'guest_mode') {
      renderLoginRequired();
      return false;
    }
    return true;
  }

  function renderLoginRequired() {
    const container = document.getElementById('portalContent');
    container.innerHTML = `
      <div class="login-required">
        <i class="fas fa-crown" style="font-size: 4rem; color: var(--deepRed); margin-bottom: 20px;"></i>
        <h2>Leader Portal Access</h2>
        <p style="margin: 16px 0;">Please login to access your Leader Dashboard</p>
        <button class="btn-primary" id="goToLoginBtn" style="padding: 12px 32px;">Login / Signup</button>
        <p style="margin-top: 20px; font-size: 0.8rem;">Note: Create a committee on the homepage to become a Leader</p>
      </div>
    `;
    document.getElementById('goToLoginBtn')?.addEventListener('click', () => {
      window.location.href = 'index.html';
    });
  }

  // Main render function
  function renderLeaderPortal() {
    if (!checkLogin()) return;

    const committees = getStorage('approvedCommittees') || [];
    const allRequests = getStorage('joinRequests') || [];

    // My committees (where I am the leader)
    const myCommittees = committees.filter(c => 
      c.leaderId === currentUser.id || c.organizerName === currentUser.name
    );
    const myCommitteeIds = myCommittees.map(c => c.id);

    // Pending requests for my committees
    const pendingRequests = allRequests.filter(r => 
      myCommitteeIds.includes(r.committeeId) && r.status === 'pending'
    );

    // Approved/Rejected requests history
    const historyRequests = allRequests.filter(r => 
      myCommitteeIds.includes(r.committeeId) && r.status !== 'pending'
    );

    // Stats
    const totalMembers = myCommittees.reduce((sum, c) => sum + c.filledSlots, 0);
    const totalSlots = myCommittees.reduce((sum, c) => sum + c.totalSlots, 0);

    const container = document.getElementById('portalContent');
    container.innerHTML = `
      <!-- Header -->
      <div class="portal-header">
        <div class="leader-info">
          <h1><i class="fas fa-crown"></i> Leader Portal</h1>
          <p>Welcome back, <strong>${escapeHtml(currentUser.name)}</strong> — Manage your committees and join requests</p>
        </div>
        <button class="back-home" onclick="window.location.href='index.html'">
          <i class="fas fa-arrow-left"></i> Back to Home
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <i class="fas fa-building"></i>
          <div class="number">${myCommittees.length}</div>
          <div class="label">Your Committees</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-users"></i>
          <div class="number">${totalMembers}</div>
          <div class="label">Total Members</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-user-plus"></i>
          <div class="number">${pendingRequests.length}</div>
          <div class="label">Pending Requests</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-check-circle"></i>
          <div class="number">${historyRequests.length}</div>
          <div class="label">Processed Requests</div>
        </div>
      </div>

      <!-- Pending Join Requests Section -->
      <div class="requests-container">
        <div class="section-title">
          <i class="fas fa-bell"></i>
          <h2>Pending Join Requests</h2>
        </div>
        <div id="pendingRequestsList"></div>
      </div>

      <!-- My Committees Section -->
      <div class="committees-container">
        <div class="section-title">
          <i class="fas fa-chart-line"></i>
          <h2>Committees You Lead</h2>
        </div>
        <div id="myCommitteesList"></div>
      </div>
    `;

    // Render pending requests
    const pendingContainer = document.getElementById('pendingRequestsList');
    if (pendingRequests.length === 0) {
      pendingContainer.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>No pending join requests</p>
          <p style="font-size: 0.8rem;">When members request to join your committees, they will appear here</p>
        </div>
      `;
    } else {
      pendingContainer.innerHTML = pendingRequests.map(req => `
        <div class="request-card" data-request-id="${req.id}">
          <div class="request-info">
            <h4><i class="fas fa-user-circle"></i> ${escapeHtml(req.requesterName)}</h4>
            <p><i class="fas fa-phone"></i> ${escapeHtml(req.requesterPhone || 'Not provided')}</p>
            <p><i class="fas fa-calendar"></i> Requested: ${new Date(req.requestedAt).toLocaleString()}</p>
            <span class="committee-badge"><i class="fas fa-handshake"></i> ${escapeHtml(req.committeeName)}</span>
          </div>
          <div class="request-actions">
            <button class="btn-approve" onclick="approveRequest(${req.id})"><i class="fas fa-check"></i> Approve</button>
            <button class="btn-reject" onclick="rejectRequest(${req.id})"><i class="fas fa-times"></i> Reject</button>
          </div>
        </div>
      `).join('');
    }

    // Render my committees
    const committeesContainer = document.getElementById('myCommitteesList');
    if (myCommittees.length === 0) {
      committeesContainer.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-plus-circle"></i>
          <p>You don't have any committees yet</p>
          <p style="font-size: 0.8rem;">Go to homepage and click "Create Committee" to become a Leader</p>
          <button class="btn-primary" onclick="window.location.href='index.html'" style="margin-top: 16px;">Create Committee</button>
        </div>
      `;
    } else {
      committeesContainer.innerHTML = myCommittees.map(comm => `
        <div class="committee-item">
          <div class="committee-details">
            <h4><i class="fas fa-users"></i> ${escapeHtml(comm.name)}</h4>
            <p><i class="fas fa-map-marker-alt"></i> ${comm.city} | ₨ ${comm.amount}/month | ${comm.duration} months</p>
            <p><i class="fas fa-user-friends"></i> ${comm.filledSlots}/${comm.totalSlots} slots filled</p>
          </div>
          <div class="member-count">
            ${comm.filledSlots} / ${comm.totalSlots} Members
          </div>
        </div>
      `).join('');
    }
  }

  // Approve Request Function
  window.approveRequest = function(requestId) {
    const requests = getStorage('joinRequests') || [];
    const requestIndex = requests.findIndex(r => r.id === requestId);
    
    if (requestIndex === -1) {
      showToast('Request not found', true);
      return;
    }

    const request = requests[requestIndex];
    const committees = getStorage('approvedCommittees') || [];
    const committee = committees.find(c => c.id === request.committeeId);

    if (!committee) {
      showToast('Committee not found', true);
      return;
    }

    // Check if committee has space
    if (committee.filledSlots >= committee.totalSlots) {
      showToast('Committee is already full! Cannot approve', true);
      return;
    }

    // Update request status
    requests[requestIndex].status = 'approved';
    setStorage('joinRequests', requests);

    // Update committee member count
    committee.filledSlots += 1;
    if (committee.filledSlots === committee.totalSlots) {
      committee.status = 'full';
    }
    setStorage('approvedCommittees', committees);

    showToast(`✅ Approved ${request.requesterName} to join ${request.committeeName}`);
    renderLeaderPortal();
  };

  // Reject Request Function
  window.rejectRequest = function(requestId) {
    const requests = getStorage('joinRequests') || [];
    const requestIndex = requests.findIndex(r => r.id === requestId);
    
    if (requestIndex === -1) {
      showToast('Request not found', true);
      return;
    }

    const request = requests[requestIndex];
    requests[requestIndex].status = 'rejected';
    setStorage('joinRequests', requests);

    showToast(`❌ Rejected ${request.requesterName}'s request to join ${request.committeeName}`);
    renderLeaderPortal();
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  // Logout function
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    const guestUser = { id: 'guest_mode', name: 'Guest', phone: '', city: '' };
    setStorage('currentUser', guestUser);
    currentUser = guestUser;
    showToast('Logged out successfully');
    renderLoginRequired();
  });

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    currentUser = getStorage('currentUser');
    if (!currentUser || currentUser.id === 'guest_mode') {
      renderLoginRequired();
    } else {
      renderLeaderPortal();
    }
  });
</script>
</body>
</html>
